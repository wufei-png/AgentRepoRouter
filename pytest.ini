# content of pytest.ini
[pytest]
testpaths = tests/unit tests/integration tests/e2e
norecursedirs = tests/repos
markers =
    x86: mark the test case into X86 test suit, X86 testing              # 可运行在X86架构上的用例
    arm: mark the test case into ARM test suit, ARM testing              # 可运行在ARM架构上的用例
    p0: mark the test case into p0 test suit, smoke testing              # 核心功能测试用例（冒烟测试）
    p1: mark the test case into p1 test suit, high priority testing      # 高优先级测试用例
    p2: mark the test case into p2 test suit, medium priority testing    # 中优先级测试用例
    p3: mark the test case into p3 test suit, low priority testing       # 低优先级测试用例
    version: mark the test case into version test suit

log_format = %(asctime)s [%(name)s] [%(levelname)s] [%(filename)s %(funcName)s %(lineno)d]: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
log_level = DEBUG

# 输入到stdout
log_cli = True
# 显示log的级别
log_cli_level = DEBUG
# 打印的format
log_cli_format = %(asctime)s [%(name)s] [%(levelname)s] [%(filename)s %(funcName)s %(lineno)d]: %(message)s
# 打印时间的format设置
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file_level = DEBUG
log_file_format = %(asctime)s [%(name)s] [%(levelname)s] [%(filename)s %(funcName)s %(lineno)d]: %(message)s
log_file_date_format=%Y-%m-%d %H:%M:%S
# log_file = test.log

addopts = -p no:warnings
